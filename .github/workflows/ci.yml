name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - 'main'
  workflow_dispatch:
    inputs:
      BRANCH:
        required: true
        default: 'main'

env:
  BRANCH: ${{ github.event.inputs.BRANCH || github.ref }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          ref: ${{ env.BRANCH }}

      - name: Setup Node.js environment
        uses: actions/setup-node@v2.1.2
        with:
          node-version: '20.x'

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "::set-output name=dir::$(yarn cache dir)"

      - name: Cache yarn cache
        uses: actions/cache@v4
        id: cache-yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ matrix.node-version }}-nodemodules-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.node-version }}-nodemodules-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build and test frontend
        run: yarn build

      - name: Setup build environment
        id: build_environment
        run: echo "::set-output name=BUILD_VERSION::$(jq -r .version package.json)"

      - name: Package plugin
        run: |
          mv dist netdatalocal-datasource
          zip "netdatalocal-datasource-${{ steps.build_environment.outputs.BUILD_VERSION }}.zip" netdatalocal-datasource -r

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netdatalocal-datasource-${{ steps.build_environment.outputs.BUILD_VERSION }}.zip
          path: ./netdatalocal-datasource-${{ steps.build_environment.outputs.BUILD_VERSION }}.zip

    outputs:
      artifact_name: netdatalocal-datasource-${{ steps.build_environment.outputs.BUILD_VERSION }}.zip
